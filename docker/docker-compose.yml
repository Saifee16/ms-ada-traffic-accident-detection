version: "3.9"

services:
  surveillance-cpu:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: cpu
    image: traffic-surv:cpu
    volumes:
      - ../input:/app/input:ro
      - ../output:/app/output
      - ../configs:/app/configs:ro
    environment:
      - WA_ACCESS_TOKEN=${WA_ACCESS_TOKEN}
      - WA_PHONE_NUMBER_ID=${WA_PHONE_NUMBER_ID}
      - WA_RECIPIENT_NUMBER=${WA_RECIPIENT_NUMBER}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_RECIPIENT=${SMTP_RECIPIENT}
    command: run --source /app/input/video.mp4 --output /app/output/processed.mp4 --alerts mock --no-display

  surveillance-gpu:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: gpu
    image: traffic-surv:gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ../input:/app/input:ro
      - ../output:/app/output
      - ../configs:/app/configs:ro
    environment:
      - WA_ACCESS_TOKEN=${WA_ACCESS_TOKEN}
      - WA_PHONE_NUMBER_ID=${WA_PHONE_NUMBER_ID}
      - WA_RECIPIENT_NUMBER=${WA_RECIPIENT_NUMBER}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_RECIPIENT=${SMTP_RECIPIENT}
    command: run --source /app/input/video.mp4 --output /app/output/processed.mp4 --alerts mock --no-display
